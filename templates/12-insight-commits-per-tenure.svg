<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <style>
    .card-bg { transition: background 0.15s ease; }
    .card-bg:hover { background: #1c2128; }
  </style>
  <rect width="320" height="80" fill="#0d1117" rx="8" class="card-bg"/>
  <rect x="0" y="0" width="2" height="80" fill="#e3b341" rx="0"/>

  <svg x="16" y="28" width="20" height="20" viewBox="0 0 24 24" fill="none">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="#e3b341" stroke="#e3b341" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>

  <text x="44" y="32" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e" letter-spacing="0.06em">COMMITS PER YEAR OF TENURE</text>
  <text x="44" y="56" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" fill="#e6edf3" font-weight="700">151.8</text>
  <text x="44" y="72" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">683 commits over 4 years</text>

  <rect y="79" width="320" height="1" fill="rgba(48, 54, 61, 0.8)" rx="0"/>
</svg>
