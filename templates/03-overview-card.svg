<svg xmlns="http://www.w3.org/2000/svg" width="480" height="210" viewBox="0 0 480 210">
  <rect width="480" height="210" fill="#0d1117" rx="12" stroke="#30363d" stroke-width="0.5"/>

  <text x="24" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681" letter-spacing="0.3">{{username}}'s GitHub stats</text>

  <line x1="24" y1="42" x2="456" y2="42" stroke="#21262d" stroke-width="0.5"/>

  <text x="56" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="500" fill="#e6edf3" text-anchor="middle">{{stars}}</text>
  <text x="56" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#6e7681" text-anchor="middle" letter-spacing="0.3">Stars</text>

  <line x1="128" y1="58" x2="128" y2="100" stroke="#21262d" stroke-width="0.5"/>

  <text x="240" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="500" fill="#e6edf3" text-anchor="middle">{{commits}}</text>
  <text x="240" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#6e7681" text-anchor="middle" letter-spacing="0.3">Commits (last year)</text>

  <line x1="352" y1="58" x2="352" y2="100" stroke="#21262d" stroke-width="0.5"/>

  <text x="424" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="500" fill="#e6edf3" text-anchor="middle">{{prs}}</text>
  <text x="424" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#6e7681" text-anchor="middle" letter-spacing="0.3">Pull requests</text>

  <line x1="24" y1="114" x2="456" y2="114" stroke="#21262d" stroke-width="0.5"/>

  <text x="24" y="132" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#6e7681" letter-spacing="0.5">TOP LANGUAGES</text>

  {{language_bar}}

  {{language_legend}}

  <line x1="24" y1="188" x2="456" y2="188" stroke="#21262d" stroke-width="0.5"/>
  <text x="24" y="202" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#484f58">github-readme-stats</text>
  <text x="456" y="202" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="end">Updated just now</text>
</svg>
