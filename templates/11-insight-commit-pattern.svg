  </style>
  <rect width="320" height="100" fill="#0d1117" rx="8" class="card-bg"/>
  <rect x="0" y="0" width="2" height="100" fill="#58a6ff" rx="0"/>

  <svg x="16" y="20" width="20" height="20" viewBox="0 0 24 24" fill="none">
    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <text x="44" y="28" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e" letter-spacing="0.06em">COMMIT PATTERN</text>

  <text x="44" y="48" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#e6edf3" font-weight="600">Weekdays: 80% / 20%</text>

  <text x="44" y="68" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#e6edf3" font-weight="600">Peak: Mornings</text>

  <text x="44" y="88" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">683 commits sampled (last 90 days)</text>

