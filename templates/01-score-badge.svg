<svg xmlns="http://www.w3.org/2000/svg" width="480" height="224" viewBox="0 0 480 224">
  <rect width="480" height="224" fill="#0d1117" rx="12"/>

  {{initials_avatar}}
  <text x="66" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#e6edf3">@{{username}}</text>
  <text x="66" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681">Job readiness score</text>

  <text x="440" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="500" fill="{{score_color}}" text-anchor="end">{{score}}</text>
  <text x="440" y="56" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681" text-anchor="end">grade {{grade}}</text>

  {{tile_1}}
  {{tile_2}}
  {{tile_3}}
  {{tile_4}}

  <text x="30" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="{{weakest_fill}}">Lowest: {{weakest_name}}, {{weakest_score}}/20</text>
  <text x="450" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681" text-anchor="end">Scored on {{score_date}}</text>
</svg>
