<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200">
  <rect width="480" height="200" fill="#111315" rx="12"/>
  <rect width="480" height="2" fill="#7d8a96" rx="0"/>

  <!-- Error Icon -->
  <rect x="216" y="60" width="48" height="48" rx="24" fill="#1e2229" stroke="#7d8a96" stroke-width="1"/>
  <text x="240" y="90" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#7d8a96" text-anchor="middle">?</text>

  <!-- Error Title -->
  <text x="240" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#e8d5a3" text-anchor="middle" font-weight="600">User Not Found</text>

  <!-- Error Description -->
  <text x="240" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#7d8a96" text-anchor="middle">The GitHub username "nonexistent-user" does not exist.</text>

  <!-- Retry Link -->
  <text x="240" y="172" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#c9a962" text-anchor="middle" text-decoration="underline">Check username and try again</text>

  <text x="24" y="190" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">github-profile-score</text>

  <rect y="198" width="480" height="2" fill="#7d8a96" rx="0"/>
</svg>
