      animation: ring-fill 0.6s ease-out forwards;
    }
  </style>
  <rect width="480" height="200" fill="#0d1117" rx="12"/>
  <rect width="480" height="2" fill="#a371f7" rx="0"/>

  <text x="240" y="28" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="0.06em">CONTRIBUTIONS</text>

  <line x1="184" y1="40" x2="184" y2="180" stroke="rgba(48, 54, 61, 0.8)" stroke-width="0.5"/>
  <line x1="344" y1="40" x2="344" y2="180" stroke="rgba(48, 54, 61, 0.8)" stroke-width="0.5"/>

  <text x="88" y="55" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Total Contributions</text>
