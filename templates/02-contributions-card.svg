  <text x="88" y="115" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Dec 30, 2022 – Present</text>

  <circle cx="264" cy="85" r="28" fill="none" stroke="rgba(48, 54, 61, 0.8)" stroke-width="5"/>
  <circle cx="264" cy="85" r="28" fill="none" stroke="#a371f7" stroke-width="5" stroke-dasharray="175.93" stroke-dashoffset="175.93" stroke-linecap="round" transform="rotate(-90, 264, 85)" class="ring-arc"/>
  <text x="264" y="81" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" fill="#e6edf3" text-anchor="middle" font-weight="700">14</text>
