<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <style>
    .card-bg { transition: background 0.15s ease; }
    .card-bg:hover { background: #1c2128; }
  </style>
  <rect width="320" height="80" fill="#0d1117" rx="8" class="card-bg"/>
  <rect x="0" y="0" width="2" height="80" fill="#58a6ff" rx="0"/>

  <svg x="16" y="28" width="20" height="20" viewBox="0 0 24 24" fill="none">
    <rect x="3" y="4" width="18" height="18" rx="2" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="3" y1="10" x2="21" y2="10" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="8" y1="2" x2="8" y2="6" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="2" x2="16" y2="6" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
  </svg>

  <text x="44" y="32" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e" letter-spacing="0.06em">ACCOUNT AGE</text>
  <text x="44" y="56" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" fill="#e6edf3" font-weight="700">4 years, 6 months</text>

  <rect y="79" width="320" height="1" fill="rgba(48, 54, 61, 0.8)" rx="0"/>
</svg>
